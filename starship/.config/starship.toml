command_timeout = 5000
add_newline = false

format = """
[](#3B4252)\
$os\
$username\
[](bg:#434C5E fg:#3B4252)\
$directory\
[](bg:#4C566A fg:#434C5E)\
$git_branch\
$git_status\
[](bg:#86BBD8 fg:#4C566A)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$python\
$docker_context\
[ ](fg:#86BBD8)\
$fill\
$status\
$cmd_duration\
[](#33658A)\
$time\
[ ](fg:#33658A)\
\n$character\
"""

right_format = ""

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[os]
disabled = false
style = "bg:#3B4252 fg:#ECEFF4"

[os.symbols]
Arch = " "
CachyOS = " "
Debian = " "

[username]
show_always = true
style_user = "bg:#3B4252 fg:#ECEFF4"
style_root = "bg:#3B4252 fg:#ECEFF4"
format = '[$user ]($style)'

[directory]
style = "bg:#434C5E fg:#ECEFF4"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = "bg:#4C566A fg:#ECEFF4"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "bg:#4C566A fg:#ECEFF4"
format = '([$ahead_behind ]($style))([$staged ]($style))([$modified ]($style))([$untracked ]($style))([$renamed ]($style))([$deleted ]($style))([$conflicted ]($style))([$stashed ]($style))'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
staged = "+${count}"
modified = "!${count}"
untracked = "?${count}"
conflicted = "~${count}"
stashed = "*${count}"
renamed = "»${count}"
deleted = "✘${count}"

[c]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol$context ]($style)$path'

[elixir]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[elm]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[golang]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[haskell]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[java]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[julia]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[nodejs]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[nim]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[python]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version )(\($virtualenv\) )]($style)'

[rust]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[status]
disabled = false
format = '[$symbol$status]($style) '
style = "fg:#E06C75"
symbol = "✘ "

[cmd_duration]
min_time = 3000
format = '[took $duration]($style) '
style = "fg:#E5C07B"

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A fg:#ECEFF4"
format = '[ $time ]($style)'
