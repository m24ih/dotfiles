command_timeout = 5000
add_newline = false

format = """
[](#3B4252)\
$os\
$username\
[](bg:#434C5E fg:#3B4252)\
$directory\
[](bg:#4C566A fg:#434C5E)\
$git_branch\
$git_status\
[](bg:#86BBD8 fg:#4C566A)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$python\
[ ](fg:#86BBD8)\
$fill\
$status\
$cmd_duration\
${custom.bat_good}\
${custom.bat_warn}\
${custom.bat_crit}\
${custom.time_chevron}\
$time\
\n$character\
"""

right_format = ""

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[os]
disabled = false
style = "bg:#3B4252 fg:#ECEFF4"

[os.symbols]
Arch = " "
CachyOS = " "
Debian = " "

[username]
show_always = true
style_user = "bg:#3B4252 fg:#ECEFF4"
style_root = "bg:#3B4252 fg:#ECEFF4"
format = '[$user ]($style)'

[directory]
style = "bg:#434C5E fg:#ECEFF4"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bg:#4C566A fg:#ECEFF4"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "bg:#4C566A fg:#ECEFF4"
format = '([$ahead_behind ]($style))([$staged ]($style))([$modified ]($style))([$untracked ]($style))([$renamed ]($style))([$deleted ]($style))([$conflicted ]($style))([$stashed ]($style))'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
staged = "+${count}"
modified = "!${count}"
untracked = "?${count}"
conflicted = "~${count}"
stashed = "*${count}"
renamed = "»${count}"
deleted = "✘${count}"

[c]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version) ]($style)'

[python]
symbol = " "
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol($version )(\($virtualenv\) )]($style)'

[custom.bat_good]
command = "cat /sys/class/power_supply/BAT*/capacity | head -n 1"
when = 'c=$(cat /sys/class/power_supply/BAT*/capacity | head -n 1 2>/dev/null); st=$(cat /sys/class/power_supply/BAT*/status | head -n 1 2>/dev/null); [ "$st" = "Discharging" ] && [ "$c" -ge 50 ]'
format = '[](fg:#A3BE8C)[  $output% ](bg:#A3BE8C fg:#2E3440)[](bg:#A3BE8C fg:#33658A)'

[custom.bat_warn]
command = "cat /sys/class/power_supply/BAT*/capacity | head -n 1"
when = 'c=$(cat /sys/class/power_supply/BAT*/capacity | head -n 1 2>/dev/null); st=$(cat /sys/class/power_supply/BAT*/status | head -n 1 2>/dev/null); [ "$st" = "Discharging" ] && [ "$c" -ge 20 ] && [ "$c" -lt 50 ]'
format = '[](fg:#EBCB8B)[  $output% ](bg:#EBCB8B fg:#2E3440)[](bg:#EBCB8B fg:#33658A)'

[custom.bat_crit]
command = "cat /sys/class/power_supply/BAT*/capacity | head -n 1"
when = 'c=$(cat /sys/class/power_supply/BAT*/capacity | head -n 1 2>/dev/null); st=$(cat /sys/class/power_supply/BAT*/status | head -n 1 2>/dev/null); [ "$st" = "Discharging" ] && [ "$c" -lt 20 ]'
format = '[](fg:#BF616A)[  $output% ](bg:#BF616A fg:#ECEFF4)[](bg:#BF616A fg:#33658A)'

[custom.time_chevron]
command = "echo 1"
when = 'st=$(cat /sys/class/power_supply/BAT*/status | head -n 1 2>/dev/null); [ "$st" != "Discharging" ]'
format = '[](fg:#33658A)'

[time]
disabled = false
time_format = "%R"
style = "bg:#33658A fg:#ECEFF4"
format = '[ $time ]($style)[](fg:#33658A)'
