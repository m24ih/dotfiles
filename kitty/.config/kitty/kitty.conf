# vim:fileencoding=utf-8:foldmethod=marker

# -----------------------------------------------------------------------------
# FONT AYARLARI
# -----------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
disable_ligatures never

# -----------------------------------------------------------------------------
# İMLEÇ (CURSOR)
# -----------------------------------------------------------------------------
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

# -----------------------------------------------------------------------------
# KAYDIRMA (SCROLLBACK) VE FARE (MOUSE)
# -----------------------------------------------------------------------------
scrollback_lines 10000
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 5.0
mouse_hide_wait 3.0
copy_on_select clipboard
strip_trailing_spaces smart

# -----------------------------------------------------------------------------
# PERFORMANS
# -----------------------------------------------------------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# -----------------------------------------------------------------------------
# ZİL (BELL)
# -----------------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# -----------------------------------------------------------------------------
# PENCERE DÜZENİ VE KDE WAYLAND OPTİMİZASYONU
# -----------------------------------------------------------------------------
remember_window_size  yes
initial_window_width  1024
initial_window_height 768
window_padding_width 0
window_margin_width 0
placement_strategy center
resize_in_steps yes
hide_window_decorations yes
confirm_os_window_close -1

linux_display_server wayland
# wayland_titlebar_color background

# -----------------------------------------------------------------------------
# KABUK ENTEGRASYONU
# -----------------------------------------------------------------------------
shell_integration enabled

# -----------------------------------------------------------------------------
# KLAVYE KISAYOLLARI
# -----------------------------------------------------------------------------
clear_all_shortcuts no
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+plus change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# -----------------------------------------------------------------------------
# TEMA ENTEGRASYONU (KITTEN THEMES)
# -----------------------------------------------------------------------------
# Saydamlık ve Bulanıklık
background_opacity 0.85
background_blur 5

# İmleç Davranışı ve İzi
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0
cursor_trail 1
cursor_trail_decay 0.01 0.5
cursor_trail_start_threshold 0


# Panoya Otomatik Kopyalama
copy_on_select yes

# Kapanış Onayını Kapatma (Arka plan işlemi yoksa)
confirm_os_window_close 0

# Sesli Uyarıyı Kapatma
enable_audio_bell no

# Scrollback Belleği
scrollback_lines 10000

allow_remote_control yes


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
